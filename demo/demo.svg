<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" width="760" height="330" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <defs>
    <clipPath id="type">
      <rect x="46" y="66" height="22" width="0">
        <animate attributeName="width" dur="7s" repeatCount="indefinite"
          values="0;0;188;188;0;0" keyTimes="0;0.057;0.229;0.943;0.97;1"/>
      </rect>
    </clipPath>
  </defs>

  <!-- window -->
  <rect x="6" y="6" width="748" height="318" rx="10" fill="#0d1117" stroke="#30363d"/>
  <circle cx="30" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="70" cy="30" r="6" fill="#27c93f"/>
  <text x="380" y="34" fill="#6e7681" text-anchor="middle" font-size="12">pssh</text>

  <!-- command line (typewriter) -->
  <text x="26" y="84" fill="#3fb950">$</text>
  <g clip-path="url(#type)">
    <text x="46" y="84" fill="#c9d1d9">pssh app-prod-1</text>
  </g>

  <!-- trace lines -->
  <g opacity="0"><text x="26" y="118" fill="#6e7681">[pssh] <tspan fill="#8b949e">ssh-comment lookup: 8f3c1a2b…</tspan></text>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.264;0.271;0.943;0.97;1"/></g>
  <g opacity="0"><text x="26" y="144" fill="#6e7681">[pssh] <tspan fill="#8b949e">passbolt probe: </tspan><tspan fill="#3fb950">ok</tspan></text>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.321;0.329;0.943;0.97;1"/></g>
  <g opacity="0"><text x="26" y="170" fill="#6e7681">[pssh] <tspan fill="#8b949e">password: 18 byte(s)</tspan></text>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.378;0.386;0.943;0.97;1"/></g>

  <!-- delivery box -->
  <g opacity="0">
    <rect x="26" y="190" width="560" height="58" rx="6" fill="none" stroke="#238636"/>
    <text x="42" y="216" fill="#3fb950">Connecting to app-prod-1 — password supplied</text>
    <text x="42" y="236" fill="#3fb950">to ssh directly (not copied, not shown).</text>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.464;0.471;0.943;0.97;1"/>
  </g>

  <!-- logged in -->
  <g opacity="0">
    <text x="26" y="286"><tspan fill="#58a6ff">deploy@app-prod-1</tspan><tspan fill="#8b949e">:~$</tspan></text>
    <rect x="322" y="272" width="9" height="18" fill="#c9d1d9">
      <animate attributeName="opacity" dur="1.06s" repeatCount="indefinite" values="1;1;0;0" keyTimes="0;0.5;0.5;1"/>
    </rect>
    <animate attributeName="opacity" dur="7s" repeatCount="indefinite" values="0;0;1;1;0;0" keyTimes="0;0.578;0.586;0.943;0.97;1"/>
  </g>
</svg>
